<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 AI Tool Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ===== 主题变量 ===== */
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface-hover: #f0f2f5;
    --border: #e4e6eb;
    --border-light: #eef0f3;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,.08);
    --radius: 10px;
    --radius-sm: 6px;
    --timeline-line: #e4e6eb;
    --tree-line: #d4d6dd;

    /* 字体大小规范 */
    --font-xs: 12px;   /* 辅助文字、时间 */
    --font-sm: 13px;   /* 按钮、工具名、标签 */
    --font-base: 14px; /* 正文、搜索框 */
    --font-lg: 16px;   /* 卡片标题 */
    --font-xl: 20px;   /* 页面标题 */
    --font-2xl: 32px;  /* 统计数字 */

    --color-read: #3b82f6;
    --color-read-bg: #eff6ff;
    --color-write: #10b981;
    --color-write-bg: #ecfdf5;
    --color-bash: #f59e0b;
    --color-bash-bg: #fffbeb;
    --color-mcp: #8b5cf6;
    --color-mcp-bg: #f5f3ff;
    --color-agent: #f97316;
    --color-agent-bg: #fff7ed;
    --color-other: #6b7280;
    --color-other-bg: #f3f4f6;

    --success: #10b981;
    --success-bg: #ecfdf5;
    --fail: #ef4444;
    --fail-bg: #fef2f2;

    --speed-fast: #10b981;
    --speed-mid: #f59e0b;
    --speed-slow: #ef4444;
  }

  body.dark {
    --bg: #0f1117;
    --surface: #1a1b23;
    --surface-hover: #22232d;
    --border: #2a2b35;
    --border-light: #1f2029;
    --text: #e4e6eb;
    --text-secondary: #9ca3af;
    --text-muted: #5c5e6e;
    --shadow: 0 1px 3px rgba(0,0,0,.2), 0 1px 2px rgba(0,0,0,.3);
    --shadow-hover: 0 4px 12px rgba(0,0,0,.4);
    --timeline-line: #2a2b35;
    --tree-line: #33344a;

    --color-read: #60a5fa;
    --color-read-bg: #172554;
    --color-write: #34d399;
    --color-write-bg: #064e3b;
    --color-bash: #fbbf24;
    --color-bash-bg: #451a03;
    --color-mcp: #a78bfa;
    --color-mcp-bg: #2e1065;
    --color-agent: #fb923c;
    --color-agent-bg: #431407;
    --color-other: #9ca3af;
    --color-other-bg: #1f2029;

    --success: #34d399;
    --success-bg: #064e3b;
    --fail: #f87171;
    --fail-bg: #450a0a;

    --speed-fast: #34d399;
    --speed-mid: #fbbf24;
    --speed-slow: #f87171;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
    transition: background .2s, color .2s;
  }

  .header {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    transition: background .2s, box-shadow .2s;
  }
  .header-top {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .header h1 {
    font-size: var(--font-xl); font-weight: 700; display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .header h1 .badge {
    font-size: var(--font-xs); background: var(--color-mcp-bg); color: var(--color-mcp);
    padding: 1px 8px; border-radius: 10px; font-weight: 500;
  }
  .stats {
    font-size: var(--font-sm); color: var(--text-secondary);
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .stats .stat-item {
    display: flex; align-items: center; gap: 4px;
  }
  .stats strong { color: var(--text); font-weight: 700; }

  .controls {
    margin-left: auto; display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  }
  .controls button, .theme-btn {
    background: var(--bg); color: var(--text-secondary);
    border: 1px solid var(--border); padding: 6px 12px;
    border-radius: var(--radius-sm); cursor: pointer; font-size: var(--font-sm);
    transition: all .15s; display: flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .controls button:hover, .theme-btn:hover {
    background: var(--surface-hover); color: var(--text);
    border-color: var(--text-muted);
  }
  .controls button.active {
    background: var(--color-read-bg); color: var(--color-read);
    border-color: var(--color-read);
  }

  .search-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 12px;
    color: var(--text); font-size: var(--font-base); width: 200px;
    outline: none; transition: border-color .15s;
  }
  .search-box:focus { border-color: var(--color-read); }
  .search-box::placeholder { color: var(--text-muted); }

  .project-select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 12px;
    color: var(--text); font-size: 12px; min-width: 150px;
    outline: none; transition: border-color .15s;
    cursor: pointer;
  }
  .project-select:focus { border-color: var(--color-read); }

  .filters {
    display: flex; gap: 4px; flex-wrap: wrap; padding: 0 4px; margin: 8px 0 0;
  }
  .filters .tag {
    padding: 3px 12px; border-radius: 20px; font-size: var(--font-sm);
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    transition: all .15s; user-select: none;
    box-shadow: var(--shadow);
  }
  .filters .tag:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .filters .tag.active {
    color: #fff; border-color: transparent;
    font-weight: 600;
  }

  /* ===== 会话分组 ===== */
  .session-group {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
    transition: background .2s, box-shadow .2s;
  }
  .session-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-light);
    transition: background .12s;
    user-select: none;
  }
  .session-header:hover { background: var(--surface-hover); }
  .session-header .arrow {
    transition: transform .2s; font-size: var(--font-xs); flex-shrink: 0;
  }
  .session-header.collapsed .arrow { transform: rotate(-90deg); }
  .session-id {
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: var(--font-xs); font-weight: 600; color: var(--text-secondary);
    cursor: help;
  }
  .session-time {
    font-size: var(--font-xs); color: var(--text-muted);
  }
  .session-stats {
    display: flex; gap: 8px; margin-left: auto; font-size: var(--font-xs);
    flex-wrap: wrap;
  }
  .session-stats span { display: flex; align-items: center; gap: 2px; }
  .session-body {
    position: relative; padding: 4px 0;
  }
  .session-body.hidden { display: none; }

  .timeline { position: relative; padding: 0 4px; }

  /* ===== 树形缩进 ===== */
  .tree-child-area {
    position: relative;
    margin-left: 20px;
    padding-left: 12px;
    border-left: 2px solid var(--tree-line);
  }

  .entry {
    position: relative; padding: 4px 8px 4px 44px;
    cursor: pointer; border-radius: var(--radius-sm);
    transition: background .12s;
    margin: 1px 0;
    min-height: 32px;
  }
  .entry:hover { background: var(--surface-hover); }
  .entry .dot {
    position: absolute; left: 18px; top: 7px; width: 20px; height: 20px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 11px; z-index: 1;
    box-shadow: 0 0 0 3px var(--surface);
    transition: box-shadow .2s, transform .15s;
  }
  .entry:hover .dot { transform: scale(1.1); }
  .entry.expanded .dot { box-shadow: 0 0 0 3px var(--surface), 0 0 0 5px rgba(59,130,246,.15); }

  .entry .title {
    display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; min-height: 26px;
  }
  .entry .tool-name {
    font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
    font-size: var(--font-sm); font-weight: 650; letter-spacing: -.01em;
    padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
  }
  .entry .tool-args {
    font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
    font-size: var(--font-sm); color: var(--text-secondary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 30px;
  }
  .entry .status-badge {
    font-size: var(--font-xs); padding: 0 5px; border-radius: 4px;
    font-weight: 600; line-height: 18px; flex-shrink: 0;
  }
  .entry .time-tag {
    font-size: var(--font-xs); color: var(--text-muted);
    white-space: nowrap; flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .entry .duration-tag {
    font-size: var(--font-xs); font-weight: 600; flex-shrink: 0;
    padding: 0 5px; border-radius: 4px; line-height: 18px;
    white-space: nowrap; font-variant-numeric: tabular-nums;
    transition: color .2s, background .2s;
  }
  .entry .duration-tag.speed-fast { color: var(--speed-fast); background: color-mix(in srgb, var(--speed-fast) 12%, transparent); }
  .entry .duration-tag.speed-mid { color: var(--speed-mid); background: color-mix(in srgb, var(--speed-mid) 12%, transparent); }
  .entry .duration-tag.speed-slow { color: var(--speed-slow); background: color-mix(in srgb, var(--speed-slow) 12%, transparent); }

  .entry .details {
    display: none; margin-top: 4px;
    padding: 8px 10px; background: var(--bg);
    border-radius: var(--radius-sm); border: 1px solid var(--border-light);
    font-size: var(--font-sm); font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    overflow-x: auto; max-height: 400px; line-height: 1.5;
    opacity: 0; transform: translateY(-10px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .entry .details pre { white-space: pre-wrap; word-break: break-all; margin: 0; }
  .entry.expanded .details { display: block; opacity: 1; transform: translateY(0); }

  /* ===== 错误状态 ===== */
  .entry.is-error {
    background: rgba(239, 68, 68, 0.04);
    border-left: 3px solid var(--fail);
  }
  .entry.is-error:hover { background: rgba(239, 68, 68, 0.08); }
  .entry.is-error .dot {
    box-shadow: 0 0 0 3px var(--surface), 0 0 0 1px var(--fail);
  }
  .entry .error-preview {
    font-size: var(--font-xs); color: var(--fail);
    padding: 4px 8px; margin-top: 2px;
    background: var(--fail-bg); border-radius: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  /* ===== 工具类型配色 ===== */
  .type-read .dot { background: var(--color-read-bg); color: var(--color-read); }
  .type-read .tool-name { background: var(--color-read-bg); color: var(--color-read); }
  .type-write .dot { background: var(--color-write-bg); color: var(--color-write); }
  .type-write .tool-name { background: var(--color-write-bg); color: var(--color-write); }
  .type-bash .dot { background: var(--color-bash-bg); color: var(--color-bash); }
  .type-bash .tool-name { background: var(--color-bash-bg); color: var(--color-bash); }
  .type-mcp .dot { background: var(--color-mcp-bg); color: var(--color-mcp); }
  .type-mcp .tool-name { background: var(--color-mcp-bg); color: var(--color-mcp); }
  .type-agent .dot { background: var(--color-agent-bg); color: var(--color-agent); }
  .type-agent .tool-name { background: var(--color-agent-bg); color: var(--color-agent); }
  .type-other .dot { background: var(--color-other-bg); color: var(--color-other); }
  .type-other .tool-name { background: var(--color-other-bg); color: var(--color-other); }
  .entry .status-badge.ok { background: var(--success-bg); color: var(--success); }
  .entry .status-badge.fail { background: var(--fail-bg); color: var(--fail); }

  .empty-state {
    text-align: center; padding: 40px 20px;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h2 { font-size: var(--font-lg); color: var(--text-secondary); font-weight: 600; margin-bottom: 4px; }
  .empty-state p { font-size: var(--font-sm); color: var(--text-muted); }

  /* ===== 自定义 Modal ===== */
  .custom-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .custom-modal-overlay.show {
    display: flex;
  }
  .custom-modal {
    background: var(--surface);
    border-radius: 12px;
    padding: 24px;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
    display: flex;
    flex-direction: column;
  }
  .custom-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .custom-modal-header h3 {
    font-size: var(--font-lg);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .custom-modal-close {
    width: 32px;
    height: 32px;
    border: none;
    background: var(--bg);
    border-radius: 8px;
    cursor: pointer;
    font-size: var(--font-lg);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .custom-modal-close:hover {
    background: var(--fail-bg);
    color: var(--fail);
  }
  .custom-modal-body {
    flex: 1;
    overflow-y: auto;
    font-size: var(--font-base);
    line-height: 1.6;
  }
  .custom-modal-body pre {
    background: var(--bg);
    padding: 12px;
    border-radius: 8px;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: var(--font-xs);
    white-space: pre-wrap;
    word-break: break-all;
    margin: 0;
    user-select: text;
    cursor: text;
  }
  .custom-modal-body .copy-hint {
    font-size: var(--font-xs);
    color: var(--text-muted);
    margin-top: 8px;
    text-align: right;
  }
  .custom-modal-footer {
    margin-top: 16px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .custom-modal-footer button {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: var(--font-sm);
    cursor: pointer;
    transition: all .15s;
  }
  .custom-modal-footer button:hover {
    background: var(--surface-hover);
  }
  .custom-modal-footer button.primary {
    background: var(--color-read);
    color: white;
    border-color: var(--color-read);
  }
  .custom-modal-footer button.primary:hover {
    opacity: .9;
  }

  .footer {
    margin-top: 12px; padding: 10px 16px; background: var(--surface);
    border-radius: var(--radius); box-shadow: var(--shadow);
    font-size: var(--font-xs); color: var(--text-muted);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    transition: background .2s, box-shadow .2s;
  }
  .footer a { color: var(--color-read); text-decoration: none; cursor: pointer; }
  .footer a:hover { text-decoration: underline; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.4); backdrop-filter: blur(2px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius);
    padding: 24px; max-width: 400px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }
  .modal h3 { font-size: var(--font-lg); margin-bottom: 8px; }
  .modal p { font-size: var(--font-sm); color: var(--text-secondary); margin-bottom: 16px; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal .actions button {
    padding: 7px 16px; border-radius: var(--radius-sm); font-size: var(--font-sm);
    cursor: pointer; border: 1px solid var(--border); transition: all .15s;
  }
  .modal .actions .cancel { background: var(--surface); color: var(--text-secondary); }
  .modal .actions .cancel:hover { background: var(--surface-hover); }
  .modal .actions .confirm { background: var(--fail); color: #fff; border-color: var(--fail); }
  .modal .actions .confirm:hover { opacity: .9; }

  .badge-duration-avg {
    font-size: 11px; color: var(--text-muted); font-weight: 400;
  }

  /* ===== 加载动画 ===== */
  .loading-dots::after {
    content: ''; animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* ===== 加载状态 ===== */
  .loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .loading-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .loading-content {
    background: var(--surface);
    padding: 24px 32px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    color: var(--text);
  }
  .loading-content .loading-spinner {
    width: 24px;
    height: 24px;
  }

  /* ===== 按钮点击反馈 ===== */
  .controls button {
    transition: all 0.15s ease;
  }
  .controls button:active {
    transform: scale(0.95);
  }

  /* ===== 搜索框清除按钮 ===== */
  .search-box-wrapper {
    position: relative;
    display: inline-block;
  }
  .search-box {
    padding-right: 28px;
  }
  .search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    border: none;
    background: var(--text-muted);
    color: var(--surface);
    border-radius: 50%;
    font-size: 10px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .search-clear.show {
    display: flex;
  }
  .search-clear:hover {
    background: var(--text-secondary);
  }

  /* ===== 状态栏 ===== */
  .status-bar {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 12px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: var(--font-sm);
    transition: background .2s, box-shadow .2s;
  }
  .status-bar .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-bar .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-bar .status-dot.ok { background: var(--success); }
  .status-bar .status-dot.error { background: var(--fail); }
  .status-bar .status-dot.warning { background: var(--speed-mid); }
  .status-bar .status-label {
    color: var(--text-secondary);
  }
  .status-bar .status-value {
    color: var(--text);
    font-weight: 600;
  }
  .status-bar .status-error {
    color: var(--fail);
    background: var(--fail-bg);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: var(--font-xs);
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
  }
  .status-bar .status-error:hover {
    white-space: normal;
  }
  .status-bar .status-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
  .status-bar .status-actions button {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    font-size: var(--font-xs);
    cursor: pointer;
    color: var(--text-secondary);
    transition: all .15s;
  }
  .status-bar .status-actions button:hover {
    background: var(--surface-hover);
    color: var(--text);
  }

  /* ===== 慢调用高亮 ===== */
  .entry.slow-warning {
    border-left: 3px solid var(--speed-mid);
    background: rgba(245, 158, 11, 0.04);
  }
  .entry.slow-warning:hover {
    background: rgba(245, 158, 11, 0.08);
  }
  .entry.slow-critical {
    border-left: 3px solid var(--speed-slow);
    background: rgba(239, 68, 68, 0.04);
  }
  .entry.slow-critical:hover {
    background: rgba(239, 68, 68, 0.08);
  }

  /* ===== 错误详情增强 ===== */
  .entry .error-details {
    display: none;
    margin-top: 8px;
    padding: 12px;
    background: var(--fail-bg);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(239, 68, 68, 0.2);
    opacity: 0; transform: translateY(-10px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .entry.expanded .error-details {
    display: block; opacity: 1; transform: translateY(0);
  }
  .error-details .error-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--fail);
  }
  .error-details .error-type {
    font-size: var(--font-xs);
    padding: 2px 6px;
    background: rgba(239, 68, 68, 0.1);
    border-radius: 4px;
  }
  .error-details .error-message {
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: var(--font-xs);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
  }
  .error-details .error-hint {
    margin-top: 8px;
    padding: 8px;
    background: rgba(239, 68, 68, 0.05);
    border-radius: 4px;
    font-size: var(--font-xs);
    color: var(--text-secondary);
  }
  .error-details .error-hint strong {
    color: var(--text);
  }

  /* ===== 耗时标签颜色 ===== */
  .entry .duration-tag.warning {
    color: var(--speed-mid);
    background: rgba(245, 158, 11, 0.12);
  }
  .entry .duration-tag.critical {
    color: var(--speed-slow);
    background: rgba(239, 68, 68, 0.12);
  }

  /* ===== 搜索结果计数 ===== */
  .search-result-count {
    font-size: var(--font-xs);
    color: var(--text-muted);
    padding: 0 8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .search-result-count .count {
    color: var(--primary);
    font-weight: 600;
  }

  @media (max-width: 700px) {
    body { padding: 12px; }
    .header-top { flex-direction: column; align-items: stretch; }
    .controls { margin-left: 0; }
    .search-box { width: 100%; }
    .entry .tool-args { max-width: 30vw; }
    .session-stats { display: none; }
    .status-bar { flex-wrap: wrap; gap: 8px; }
    .status-bar .status-error { max-width: 200px; }
  }
</style>
</head>
<body>

<script>
const PROJECTS_FILE = 'projects.json';
let projects = {};
let currentProject = null;

const TOOL_TYPES = {
  Read: 'read', Glob: 'read', Grep: 'read', WebFetch: 'read', WebSearch: 'read',
  Write: 'write', Edit: 'write', NotebookEdit: 'write',
  Bash: 'bash',
  Agent: 'agent', TaskCreate: 'agent', TaskUpdate: 'agent', TaskOutput: 'agent',
  AskUserQuestion: 'other', EnterPlanMode: 'other', ExitPlanMode: 'other',
  CronCreate: 'other', CronDelete: 'other', CronList: 'other',
  ScheduleWakeup: 'other',
};
const TYPE_LABELS = { read: '读文件', write: '写文件', bash: '命令', mcp: 'MCP 工具', agent: '子代理', other: '其他' };
const TYPE_ICONS = { read: '📖', write: '✏️', bash: '💻', mcp: '🔌', agent: '🤖', other: '⚙️' };
const TOOL_ICONS = {
  Read: '📖', Glob: '🔍', Grep: '🔎', WebFetch: '🌐', WebSearch: '🔗',
  Write: '✏️', Edit: '✂️', NotebookEdit: '📓',
  Bash: '💻',
  Agent: '🤖', TaskCreate: '📋', TaskUpdate: '🔄', TaskOutput: '📄',
  AskUserQuestion: '❓', EnterPlanMode: '📝', ExitPlanMode: '✅',
  CronCreate: '⏰', CronDelete: '🗑️', CronList: '📋', ScheduleWakeup: '⏳',
};
const SESSION_COLORS = [
  '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444',
  '#ec4899', '#06b6d4', '#84cc16', '#f97316', '#6366f1',
];

let entries = [];
let autoRefreshTimer = null;
let incrementalMode = false;  // true = 自动刷新模式，仅追加新条目
let renderedSeqs = new Set(); // 已渲染条目的 seq 集合
let searchTimer = null;       // 搜索防抖

// ===== 状态持久化 =====
function getSortOrder() { return localStorage.getItem('tooltrace-sort') || 'desc'; }
function setSortOrder(v) { localStorage.setItem('tooltrace-sort', v); }
function getCollapsedSessions() {
  try { return JSON.parse(localStorage.getItem('tooltrace-collapsed') || '[]'); } catch { return []; }
}
function setCollapsedSessions(arr) { localStorage.setItem('tooltrace-collapsed', JSON.stringify(arr)); }

// ===== 工具函数 =====
function getType(toolName) {
  if (toolName.startsWith('mcp__')) return 'mcp';
  return TOOL_TYPES[toolName] || 'other';
}

function getIcon(toolName) {
  if (toolName.startsWith('mcp__')) {
    const parts = toolName.split('__');
    return parts.length >= 3 ? parts[2].charAt(0).toUpperCase() : '🔌';
  }
  return TOOL_ICONS[toolName] || '⚙️';
}

function formatAbsTime(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function formatFullTime(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function relativeTime(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  if (diff < 2000) return '刚刚';
  if (diff < 60000) return `${Math.floor(diff / 1000)}s`;
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m`;
  return `${Math.floor(mins / 60)}h${mins % 60}m`;
}

function shortId(sid) {
  if (!sid) return 'unknown';
  return sid.length > 8 ? sid.substring(0, 8) + '…' : sid;
}

function getSessionColor(sid, index) {
  if (!sid) return SESSION_COLORS[0];
  let h = 0;
  for (let i = 0; i < sid.length; i++) h = ((h << 5) - h) + sid.charCodeAt(i);
  return SESSION_COLORS[Math.abs(h) % SESSION_COLORS.length];
}

/** 格式化持续时间为人类可读 */
function formatDuration(ms) {
  if (ms == null) return '';
  if (ms < 1000) return `${Math.round(ms)}ms`;
  if (ms < 60000) return `${(ms / 1000).toFixed(1)}s`;
  const m = Math.floor(ms / 60000);
  const s = Math.round((ms % 60000) / 1000);
  return `${m}m${s}s`;
}

/** 根据耗时返回速度等级 */
function speedGrade(ms) {
  if (ms == null) return null;
  if (ms < 500) return 'fast';
  if (ms < 3000) return 'mid';
  return 'slow';
}

/** 追加新增的条目到 DOM（不重建已有 DOM） */
function appendEntries(newEntries) {
  if (newEntries.length === 0) return;
  // 过滤掉已渲染的
  const unseen = newEntries.filter(e => !renderedSeqs.has(e.seq));
  if (unseen.length === 0) return;

  const container = document.getElementById('sessionContainer');
  // 如果没有 session-group，触一次全量渲染
  if (!container.querySelector('.session-group')) {
    render();
    return;
  }

  // 按会话分组
  const groups = {};
  unseen.forEach(e => {
    const sid = e.session_id || 'unknown';
    if (!groups[sid]) groups[sid] = [];
    groups[sid].push(e);
  });

  for (const [sid, group] of Object.entries(groups)) {
    // 查找已有的 session-group
    let sessionEl = container.querySelector(`[data-sid="${sid}"]`);
    if (sessionEl) {
      // 找到 body
      const body = sessionEl.parentElement.querySelector('.session-body .timeline');
      if (body) {
        for (const entry of group) {
          const html = buildEntryHTML(entry, 0, false);
          body.insertAdjacentHTML('beforeend', html);
          if (entry.seq != null) renderedSeqs.add(entry.seq);
        }
      }
      // 更新会话统计
      updateSessionStats(sessionEl.parentElement);
    } else {
      // 没有这个会话组——全量渲染太贵，偷懒直接全量重渲
      render();
      return;
    }
  }
}

function updateSessionStats(sessionGroup) {
  const header = sessionGroup.querySelector('.session-header');
  const entriesInGroup = sessionGroup.querySelectorAll('.entry');
  const gTotal = entriesInGroup.length;
  const gOk = sessionGroup.querySelectorAll('.entry:not(.is-error)').length;
  const gFail = gTotal - gOk;

  const statsDiv = header.querySelector('.session-stats');
  if (statsDiv) {
    statsDiv.innerHTML = `
      <span>📋 ${gTotal}</span>
      <span>✅ ${gOk}</span>
      ${gFail ? `<span style="color:var(--fail)">❌ ${gFail}</span>` : ''}
    `;
  }
}

// ===== 主题 =====
function getTheme() { return localStorage.getItem('tooltrace-theme') || 'light'; }
function setTheme(t) {
  document.body.classList.toggle('dark', t === 'dark');
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('tooltrace-theme', t);
}
function toggleTheme() { setTheme(getTheme() === 'dark' ? 'light' : 'dark'); }

// ===== 排序切换 =====
function toggleSort() {
  const cur = getSortOrder();
  const next = cur === 'desc' ? 'asc' : 'desc';
  setSortOrder(next);
  document.getElementById('sortBtn').textContent = next === 'desc' ? '⬇ 最新优先' : '⬆ 最早优先';
  incrementalMode = false;
  render();
}

// ===== 搜索防抖 =====
function onSearchInput() {
  const searchBox = document.getElementById('search');
  const clearBtn = document.getElementById('searchClear');
  clearBtn.classList.toggle('show', searchBox.value.length > 0);

  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { incrementalMode = false; render(); }, 200);
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('searchClear').classList.remove('show');
  document.getElementById('searchResultCount').innerHTML = '';
  incrementalMode = false;
  render();
}

// ===== 加载状态 =====
function showLoading() {
  document.getElementById('loadingOverlay').classList.add('show');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

// ===== 全部展开/折叠 =====
function toggleCollapseAll(e) {
  e?.preventDefault();
  const headers = document.querySelectorAll('.session-header');
  const allCollapsed = Array.from(headers).every(h => h.classList.contains('collapsed'));
  headers.forEach(h => {
    h.classList.toggle('collapsed', !allCollapsed);
    h.nextElementSibling.classList.toggle('hidden', !allCollapsed);
  });
  const sids = Array.from(headers).map(h => h.dataset.sid);
  setCollapsedSessions(allCollapsed ? [] : sids);
}

// ===== 构建入口 HTML（递归构建树）=====
function buildEntryHTML(entry, depth, expandErrors) {
  const type = getType(entry.tool_name);
  const input = entry.input_summary || {};
  const argsParts = [];
  for (const [k, v] of Object.entries(input)) {
    if (k === 'description' && !v) continue;
    if (k === 'mcp_server') continue;
    if (k === 'file_path') argsParts.push(`📄 ${v}`);
    else if (k === 'command') argsParts.push(`<span style="opacity:.7">$</span> ${v}`);
    else if (k === 'pattern') argsParts.push(`/${v}/`);
    else if (k === 'keys') argsParts.push(`[${v.join(', ')}]`);
    else if (k === 'tool') argsParts.push(`<span style="opacity:.6">${v}</span>`);
    else if (typeof v === 'string') argsParts.push(`${k}=${v}`);
  }
  const argsText = argsParts.join(' · ') || '—';
  const icon = getIcon(entry.tool_name);
  const fullTime = formatFullTime(entry.ts);
  const absTime = formatAbsTime(entry.ts);
  const relTime = relativeTime(entry.ts);
  const isError = entry.success === false;

  // 耗时标签 - 增强版（添加 warning 和 critical 等级）
  const dur = entry.duration_ms;
  let durClass = '';
  if (dur != null) {
    if (dur >= 3000) durClass = 'critical';
    else if (dur >= 1000) durClass = 'warning';
    else durClass = speedGrade(dur);
  }
  const durHtml = dur != null
    ? `<span class="duration-tag ${durClass ? 'speed-' + durClass : ''} ${durClass}">${formatDuration(dur)}</span>`
    : '';

  // 缩进 style
  const indentStyle = depth > 0 ? ` style="padding-left:${44 + depth * 16}px"` : '';

  // 如果是树形子节点，额外标记
  const extraClass = depth > 0 ? ' tree-child' : '';

  // 慢调用高亮 class
  let slowClass = '';
  if (dur != null) {
    if (dur >= 3000) slowClass = ' slow-critical';
    else if (dur >= 1000) slowClass = ' slow-warning';
  }

  // 错误条目默认展开
  const expandedClass = (isError || (depth === 0 && expandErrors)) ? ' expanded' : '';

  // 子条目（调用链）
  let childrenHtml = '';
  if (entry._children && entry._children.length > 0) {
    childrenHtml = `<div class="tree-child-area">`;
    for (const child of entry._children) {
      childrenHtml += buildEntryHTML(child, depth + 1, expandErrors);
    }
    // 最后一个子条目下面的连线截断
    childrenHtml += `</div>`;
  }

  return `<div class="entry type-${type}${isError ? ' is-error' : ''}${slowClass}${extraClass}${expandedClass}" onclick="toggleExpand(this)"${indentStyle}>
    <div class="dot">${icon.match(/[\u{1F000}-\u{1FFFF}]|[☀-➿]|[✀-➿]|[a-zA-Z0-9]/u)?.[0] || icon[0] || '?'}</div>
    <div class="title">
      <span class="tool-name">${entry.tool_name}</span>
      <span class="tool-args" title="${argsText.replace(/"/g, '&quot;')}">${argsText}</span>
      ${durHtml}
      <span class="status-badge ${entry.success !== false ? 'ok' : 'fail'}">${entry.success !== false ? '✓' : '✗'}</span>
      <span class="time-tag" title="${fullTime}">${absTime} ${relTime}</span>
    </div>
    ${isError && entry.error ? `<div class="error-preview">❌ ${entry.error.replace(/</g, '&lt;')}</div>` : ''}
    ${isError && entry.error ? buildErrorDetails(entry.error) : ''}
    <div class="details"><pre>${JSON.stringify({...entry, ts: fullTime + ' (' + relTime + ')'}, null, 2).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre></div>
    ${childrenHtml}
  </div>`;
}

/** 构建错误详情 HTML */
function buildErrorDetails(errorMsg) {
  // 错误分类
  let errorType = '未知错误';
  let errorHint = '';

  if (errorMsg.includes('SyntaxError')) {
    errorType = '语法错误';
    errorHint = '检查代码语法，可能是拼写错误或缺少括号';
  } else if (errorMsg.includes('ReferenceError') || errorMsg.includes('TypeError')) {
    errorType = '运行时错误';
    errorHint = '检查变量是否已定义，类型是否正确';
  } else if (errorMsg.includes('ENOENT') || errorMsg.includes('No such file')) {
    errorType = '文件不存在';
    errorHint = '检查文件路径是否正确，文件是否存在';
  } else if (errorMsg.includes('Permission denied')) {
    errorType = '权限错误';
    errorHint = '检查文件权限，可能需要管理员权限';
  } else if (errorMsg.includes('Exit code')) {
    errorType = '命令执行失败';
    errorHint = '检查命令语法和参数是否正确';
  } else if (errorMsg.includes('timeout') || errorMsg.includes('Timeout')) {
    errorType = '超时错误';
    errorHint = '操作耗时过长，可能需要优化或增加超时时间';
  }

  return `
    <div class="error-details">
      <div class="error-header">
        <span>❌ 错误详情</span>
        <span class="error-type">${errorType}</span>
      </div>
      <div class="error-message">${errorMsg.replace(/</g, '&lt;')}</div>
      ${errorHint ? `<div class="error-hint"><strong>💡 建议：</strong>${errorHint}</div>` : ''}
    </div>
  `;
}

// ===== 构建树形结构 =====
function buildTrees(entries) {
  // 按 seq 索引
  const bySeq = {};
  // 找有 parent_seq 的
  for (const e of entries) {
    if (e.seq != null) bySeq[e.seq] = e;
    e._children = [];
  }
  // 建立父子关系
  const roots = [];
  for (const e of entries) {
    if (e.parent_seq != null && bySeq[e.parent_seq]) {
      bySeq[e.parent_seq]._children.push(e);
    } else {
      roots.push(e);
    }
  }
  return roots;
}

// ===== 主渲染 =====
function render() {
  const container = document.getElementById('sessionContainer');
  const q = document.getElementById('search').value.trim().toLowerCase();
  const activeFilter = document.querySelector('.filters .tag.active')?.dataset?.filter || 'all';
  const sortDesc = getSortOrder() === 'desc';

  // === 过滤 ===
  // 先解析出状态筛选（filter 格式: "type|status"）
  let typeFilter = activeFilter;
  let statusFilter = 'all';
  if (activeFilter.includes('|')) {
    const parts = activeFilter.split('|');
    typeFilter = parts[0];
    statusFilter = parts[1];
  }

  const filtered = entries.filter(e => {
    // 工具类型筛选
    if (typeFilter !== 'all' && getType(e.tool_name) !== typeFilter) return false;
    // 状态筛选
    if (statusFilter === 'ok' && e.success === false) return false;
    if (statusFilter === 'fail' && e.success !== false) return false;
    // 搜索
    if (!q) return true;
    if (e.tool_name.toLowerCase().includes(q)) return true;
    if (e.session_id && e.session_id.toLowerCase().includes(q)) return true;
    const input = e.input_summary || {};
    for (const v of Object.values(input)) {
      if (typeof v === 'string' && v.toLowerCase().includes(q)) return true;
    }
    return false;
  });

  // === 全局统计 ===
  updateStats();

  // === 搜索结果计数 ===
  const searchResultCount = document.getElementById('searchResultCount');
  if (q) {
    searchResultCount.innerHTML = `<span class="count">${filtered.length}</span> 条结果`;
  } else {
    searchResultCount.innerHTML = '';
  }

  // === 过滤标签 ===
  renderFilters(typeFilter, statusFilter);

  // === 构建树 ===
  const roots = buildTrees(filtered);

  // === 按会话分组（使用树根节点）===
  const groups = {};
  roots.forEach(e => {
    const sid = e.session_id || 'unknown';
    if (!groups[sid]) groups[sid] = [];
    groups[sid].push(e);
  });

  let sessionIds = Object.keys(groups);
  sessionIds.sort((a, b) => {
    const ga = groups[a], gb = groups[b];
    const ta = ga.reduce((min, e) => Math.min(min, new Date(e.ts).getTime()), Infinity);
    const tb = gb.reduce((min, e) => Math.min(min, new Date(e.ts).getTime()), Infinity);
    return sortDesc ? tb - ta : ta - tb;
  });

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state" style="background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 20px">
      <div class="icon">${q || typeFilter !== 'all' || statusFilter !== 'all' ? '🔍' : '⚡'}</div>
      <h2>${q || typeFilter !== 'all' || statusFilter !== 'all' ? '没有匹配的调用' : '等待工具调用…'}</h2>
      ${q || typeFilter !== 'all' || statusFilter !== 'all' ? '<p>试试其他搜索词或取消筛选</p>' : '<p>hook 生效后会自动记录</p>'}
    </div>`;
    return;
  }

  const collapsedSids = getCollapsedSessions();

  let allHtml = '';
  sessionIds.forEach((sid, si) => {
    const group = groups[sid];
    const color = getSessionColor(sid, si);

    // 统计
    const gTotal = countEntries(group);
    const gOk = countSuccess(group);
    const gFail = gTotal - gOk;

    // 平均耗时
    const allEntries = flattenTree(group);
    const durations = allEntries.map(e => e.duration_ms).filter(d => d != null);
    const avgDur = durations.length > 0
      ? durations.reduce((a, b) => a + b, 0) / durations.length
      : null;

    const times = allEntries.map(e => new Date(e.ts).getTime());
    const tMin = Math.min(...times);
    const tMax = Math.max(...times);
    const timeRange = tMin === tMax
      ? formatFullTime(tMin)
      : `${formatAbsTime(tMin)} ~ ${formatAbsTime(tMax)}`;

    const isCollapsed = collapsedSids.includes(sid);
    const entryArrow = isCollapsed ? '▶' : '▼';

    allHtml += `<div class="session-group">
      <div class="session-header ${isCollapsed ? 'collapsed' : ''}" data-sid="${sid}"
        onclick="toggleSession(this)">
        <span class="arrow">${entryArrow}</span>
        <span class="session-id" title="会话ID: ${sid}" style="color:${color}">
          ${shortId(sid)}
        </span>
        <span class="session-time" title="${formatFullTime(tMin)}">${timeRange}</span>
        <span class="session-stats">
          <span>📋 ${gTotal}</span>
          <span>✅ ${gOk}</span>
          ${gFail ? `<span style="color:var(--fail)">❌ ${gFail}</span>` : ''}
          ${avgDur != null ? `<span class="badge-duration-avg">⚡ ${formatDuration(avgDur)}</span>` : ''}
        </span>
      </div>
      <div class="session-body ${isCollapsed ? 'hidden' : ''}">
        <div class="timeline">`;

    // 按时间排序组内条目（树根）
    const sorted = [...group].sort((a, b) => {
      const ta = new Date(a.ts).getTime();
      const tb = new Date(b.ts).getTime();
      return sortDesc ? tb - ta : ta - tb;
    });

    for (const entry of sorted) {
      allHtml += buildEntryHTML(entry, 0, false);
    }

    allHtml += `</div></div></div>`;
  });

  container.innerHTML = allHtml;

  // 记录已渲染的 seq
  renderedSeqs = new Set();
  for (const e of flattenTree(entries)) {
    if (e.seq != null) renderedSeqs.add(e.seq);
  }
}

/** 扁平化树为数组 */
function flattenTree(roots) {
  const result = [];
  function walk(list) {
    for (const e of list) {
      result.push(e);
      if (e._children) walk(e._children);
    }
  }
  walk(roots);
  return result;
}

function countEntries(roots) {
  return flattenTree(roots).length;
}

function countSuccess(roots) {
  return flattenTree(roots).filter(e => e.success !== false).length;
}

// ===== 统计更新 =====
function updateStats() {
  const total = entries.length;
  const ok = entries.filter(e => e.success !== false).length;
  const fail = total - ok;

  // 耗时统计
  const durs = entries.map(e => e.duration_ms).filter(d => d != null);
  const totalDur = durs.length > 0 ? durs.reduce((a, b) => a + b, 0) : 0;
  const avgDur = durs.length > 0 ? formatDuration(totalDur / durs.length) : '';
  const slowTotal = durs.filter(d => d >= 3000).length;

  const byTool = {};
  entries.forEach(e => { byTool[e.tool_name] = (byTool[e.tool_name] || 0) + 1; });
  const sortedTools = Object.entries(byTool).sort((a,b) => b[1]-a[1]);
  const usedTools = sortedTools.slice(0, 3);

  let statsHtml = `<span class="stat-item">📊 共 <strong>${total}</strong> 次调用</span>
    <span class="stat-item">✅ <strong style="color:var(--success)">${ok}</strong></span>
    <span class="stat-item">❌ <strong style="color:var(--fail)">${fail}</strong></span>`;
  if (totalDur > 0) {
    statsHtml += `<span class="stat-item">⚡ <strong>${formatDuration(totalDur)}</strong>`;
    if (avgDur) statsHtml += ` <span style="color:var(--text-muted)">(均 ${avgDur})</span>`;
    statsHtml += `</span>`;
    if (slowTotal > 0) {
      statsHtml += `<span class="stat-item" style="color:var(--speed-slow)">🐢 ≥3s: ${slowTotal}</span>`;
    }
  }
  if (usedTools.length > 0 && total > 0) {
    statsHtml += `<span class="stat-item">🔥 ${usedTools.map(([name, cnt]) =>
      `<span style="color:var(--text-muted)">${name}</span> <strong>${cnt}</strong>`
    ).join(' · ')}</span>`;
  }
  document.getElementById('stats').innerHTML = statsHtml;
  document.getElementById('entryCount').textContent = `${total} 条`;
}

// ===== 过滤标签渲染 =====
let _lastTypeFilter = 'all';
let _lastStatusFilter = 'all';

function renderFilters(activeType, activeStatus) {
  _lastTypeFilter = activeType;
  _lastStatusFilter = activeStatus;

  const tagSet = new Set();
  entries.forEach(e => tagSet.add(getType(e.tool_name)));
  const types = ['all', ...tagSet];
  const colors = { all: 'var(--text-muted)', read: 'var(--color-read)', write: 'var(--color-write)',
    bash: 'var(--color-bash)', mcp: 'var(--color-mcp)', agent: 'var(--color-agent)', other: 'var(--color-other)' };

  const failCount = entries.filter(e => e.success === false).length;
  const okCount = entries.filter(e => e.success !== false).length;

  let html = '';
  // 类型标签
  for (const t of types) {
    const count = t === 'all' ? entries.length : entries.filter(e => getType(e.tool_name) === t).length;
    const label = t === 'all' ? '全部' : (TYPE_LABELS[t] || t);
    const icon = t === 'all' ? '' : (TYPE_ICONS[t] || '');
    const c = colors[t] || 'var(--text-muted)';
    const filterKey = t;
    const isActive = activeType === t && activeStatus === 'all';
    html += `<span class="tag ${isActive ? 'active' : ''}"
      style="${isActive ? `background:${c};color:#fff` : ''}"
      data-filter="${filterKey}" onclick="setFilter('${filterKey}')">
      ${icon} ${label} ${count}</span>`;
  }

  // 成功/失败标签
  if (okCount > 0) {
    const filterKey = `all|ok`;
    const isActive = activeType === 'all' && activeStatus === 'ok';
    html += `<span class="tag ${isActive ? 'active' : ''}"
      style="${isActive ? 'background:var(--success);color:#fff' : ''}"
      data-filter="${filterKey}" onclick="setFilter('${filterKey}')">
      ✅ 成功 ${okCount}</span>`;
  }
  if (failCount > 0) {
    const filterKey = `all|fail`;
    const isActive = activeType === 'all' && activeStatus === 'fail';
    html += `<span class="tag ${isActive ? 'active' : ''}"
      style="${isActive ? 'background:var(--fail);color:#fff' : ''}"
      data-filter="${filterKey}" onclick="setFilter('${filterKey}')">
      ❌ 失败 ${failCount}</span>`;
  }

  document.getElementById('filters').innerHTML = html;
}

function setFilter(f) {
  document.querySelectorAll('.filters .tag').forEach(t => t.classList.toggle('active', t.dataset.filter === f));
  incrementalMode = false;
  render();
}

function toggleExpand(el) {
  el.classList.toggle('expanded');
  if (el.classList.contains('expanded')) {
    setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }
}

function toggleSession(header) {
  header.classList.toggle('collapsed');
  const body = header.nextElementSibling;
  body.classList.toggle('hidden');
  const sid = header.dataset.sid;
  let collapsed = getCollapsedSessions();
  if (body.classList.contains('hidden')) {
    if (!collapsed.includes(sid)) collapsed.push(sid);
  } else {
    collapsed = collapsed.filter(s => s !== sid);
  }
  setCollapsedSessions(collapsed);
  const arrow = header.querySelector('.arrow');
  arrow.textContent = body.classList.contains('hidden') ? '▶' : '▼';
}

function toggleAutoRefresh() {
  const btn = document.getElementById('autoRefreshBtn');
  const liveBadge = document.getElementById('liveBadge');
  if (autoRefreshTimer) {
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = null;
    btn.innerHTML = '⏸ 自动';
    btn.classList.remove('active');
    liveBadge.textContent = 'LIVE';
    liveBadge.style.background = '';
    liveBadge.style.color = '';
    incrementalMode = false;
  } else {
    // 自动刷新间隔：比固定 2s 更智能，如果在后台则延长
    autoRefreshTimer = setInterval(() => {
      if (document.hidden) return; // 后台标签页不刷新
      incrementalMode = true;
      loadLog();
    }, 3000);
    btn.innerHTML = '⏹ 自动(3s)';
    btn.classList.add('active');
    liveBadge.textContent = '● LIVE';
    liveBadge.style.background = 'rgba(16,185,129,0.15)';
    liveBadge.style.color = 'var(--success)';
    // 首次开启就刷新一次
    incrementalMode = true;
    loadLog();
  }
}

function toggleConfig(e) {
  e?.preventDefault();
  const block = document.getElementById('configBlock');
  block.style.display = block.style.display === 'none' ? 'block' : 'none';
}

function showClearModal() { document.getElementById('clearModal').classList.add('show'); }

// ===== 键盘快捷键 =====
document.addEventListener('keydown', (e) => {
  // Ctrl+F / Cmd+F -> 搜索框
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  // R（非输入框内）-> 刷新
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey &&
      document.activeElement?.tagName !== 'INPUT') {
    e.preventDefault();
    incrementalMode = false;
    loadLog();
  }
});

// ===== 项目切换 =====
async function loadProjects() {
  try {
    const resp = await fetch(PROJECTS_FILE + '?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    projects = await resp.json();

    const select = document.getElementById('projectSelect');
    const entries = Object.entries(projects).sort((a, b) => {
      return new Date(b[1].last_seen) - new Date(a[1].last_seen);
    });

    if (entries.length === 0) {
      select.innerHTML = '<option value="">暂无项目</option>';
      return;
    }

    // 获取上次选择的项目
    const lastProject = localStorage.getItem('tooltrace-project');
    let selectedKey = null;

    let html = '';
    for (const [key, proj] of entries) {
      const isSelected = lastProject === key || (!lastProject && entries[0][0] === key);
      if (isSelected) selectedKey = key;
      html += `<option value="${key}" ${isSelected ? 'selected' : ''}>${proj.name}</option>`;
    }
    select.innerHTML = html;

    if (selectedKey) {
      currentProject = selectedKey;
      localStorage.setItem('tooltrace-project', selectedKey);
    }
  } catch (e) {
    console.error('Failed to load projects:', e);
  }
}

function switchProject() {
  const select = document.getElementById('projectSelect');
  const key = select.value;
  if (key) {
    currentProject = key;
    localStorage.setItem('tooltrace-project', key);
    incrementalMode = false;
    loadLog();
  }
}

// ===== 加载（支持增量）=====
async function loadLog() {
  try {
    // 如果没有选择项目，先加载项目列表
    if (!currentProject) {
      await loadProjects();
      if (!currentProject) return;
    }

    // 显示加载状态（仅在非增量模式时）
    if (!incrementalMode) {
      showLoading();
    }

    const logPath = `logs/${currentProject}.jsonl`;
    const resp = await fetch(logPath + '?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) {
      entries = [];
      hideLoading();
      render();
      return;
    }
    const text = await resp.text();
    const newEntries = text.trim().split('\n').filter(Boolean).map(line => {
      try { return JSON.parse(line); } catch { return null; }
    }).filter(Boolean);

    if (incrementalMode && entries.length > 0 && newEntries.length > entries.length) {
      // 增量模式：只追加新条目
      const added = newEntries.slice(entries.length);
      entries = newEntries;
      appendEntries(added);
      updateStats();
    } else {
      // 全量重渲染
      const wasEmpty = entries.length === 0;
      entries = newEntries;
      renderedSeqs = new Set();
      if (!wasEmpty) incrementalMode = false; // 手动刷新退出增量模式
      render();
    }

    hideLoading();
  } catch (e) { /* 静默 */ }
}

// ===== 状态栏功能 =====
function checkHookStatus() {
  const statusDot = document.getElementById('hookStatus');
  const statusText = document.getElementById('hookStatusText');

  // 先检查工具调用错误
  const recentErrors = entries.filter(e => e.success === false).slice(-5);

  // 同时检查钩子执行错误（trace_error.log）
  fetch('trace_error.log?t=' + Date.now(), { cache: 'no-store' })
    .then(resp => resp.ok ? resp.text() : '')
    .catch(() => '')
    .then(hookLog => {
      const hasHookErrors = hookLog && hookLog.trim().length > 0;
      const hookErrorLines = hookLog ? hookLog.trim().split('\n') : [];
      const lastHookError = hookErrorLines.length > 0 ? hookErrorLines[hookErrorLines.length - 1] : null;

      if (hasHookErrors || recentErrors.length > 0) {
        statusDot.className = 'status-dot error';
        statusText.textContent = hasHookErrors ? '钩子异常' : '有错误';
        statusText.style.color = 'var(--fail)';

        const errorEl = document.getElementById('lastError');
        const errorTextEl = document.getElementById('lastErrorText');

        // 优先显示钩子执行错误
        if (hasHookErrors && lastHookError) {
          const shortErr = lastHookError.replace(/^\[.*?\]\s*/, '').substring(0, 60);
          errorEl.textContent = shortErr + (lastHookError.length > 60 ? '...' : '');
          errorEl.style.display = 'inline';
          errorEl.title = lastHookError;
          errorEl.onclick = () => showErrorLog();
          errorEl.style.cursor = 'pointer';
          errorTextEl.style.display = 'none';
        } else if (recentErrors.length > 0) {
          const lastError = recentErrors[recentErrors.length - 1];
          if (lastError.error) {
            errorEl.textContent = lastError.error.substring(0, 50) + (lastError.error.length > 50 ? '...' : '');
            errorEl.style.display = 'inline';
            errorEl.title = lastError.error;
            errorTextEl.style.display = 'none';
          } else {
            errorEl.style.display = 'none';
            errorTextEl.textContent = lastError.tool_name + ' 失败';
            errorTextEl.style.color = 'var(--fail)';
          }
        }
      } else {
        statusDot.className = 'status-dot ok';
        statusText.textContent = '正常';
        statusText.style.color = 'var(--success)';
        document.getElementById('lastError').style.display = 'none';
        document.getElementById('lastErrorText').textContent = '无';
        document.getElementById('lastErrorText').style.color = '';
      }

      // 更新慢调用计数
      const slowCount = entries.filter(e => e.duration_ms != null && e.duration_ms >= 1000).length;
      document.getElementById('slowCount').textContent = slowCount;
      document.getElementById('slowCount').style.color = slowCount > 0 ? 'var(--speed-mid)' : '';
    });
}

function showErrorLog() {
  // 尝试获取错误日志
  fetch('trace_error.log?t=' + Date.now(), { cache: 'no-store' })
    .then(resp => {
      if (!resp.ok) {
        // 文件不存在，说明没有错误
        showCustomModal('📋 错误日志', `
          <div style="text-align:center;padding:30px">
            <div style="font-size:48px;margin-bottom:16px">✅</div>
            <div style="font-size:16px;color:var(--success);margin-bottom:8px">没有错误日志</div>
            <div style="color:var(--text-muted)">Hook 运行正常，没有记录到错误</div>
          </div>
        `, false);
        return;
      }
      return resp.text();
    })
    .then(text => {
      if (text && text.trim()) {
        showCustomModal('📋 错误日志', `
          <div>
            <pre>${text.replace(/</g, '&lt;')}</pre>
            <div class="copy-hint">点击"复制"按钮可复制内容</div>
          </div>
        `, true);
      }
    })
    .catch(() => {
      // 网络错误或其他问题
      showCustomModal('📋 错误日志', `
        <div style="text-align:center;padding:30px">
          <div style="font-size:48px;margin-bottom:16px">✅</div>
          <div style="font-size:16px;color:var(--success);margin-bottom:8px">没有错误日志</div>
          <div style="color:var(--text-muted)">Hook 运行正常，没有记录到错误</div>
        </div>
      `, false);
    });
}

// ===== 自定义 Modal =====
function showCustomModal(title, content, showCopy = true) {
  document.getElementById('customModalTitle').innerHTML = title;
  document.getElementById('customModalBody').innerHTML = content;
  document.getElementById('customModalCopy').style.display = showCopy ? 'block' : 'none';
  document.getElementById('customModal').classList.add('show');
}

function hideCustomModal() {
  document.getElementById('customModal').classList.remove('show');
}

function copyModalContent() {
  const content = document.getElementById('customModalBody').innerText;
  navigator.clipboard.writeText(content).then(() => {
    const btn = document.getElementById('customModalCopy');
    const originalText = btn.innerHTML;
    btn.innerHTML = '✅ 已复制';
    setTimeout(() => { btn.innerHTML = originalText; }, 2000);
  }).catch(() => {
    // 降级方案
    const textarea = document.createElement('textarea');
    textarea.value = content;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);

    const btn = document.getElementById('customModalCopy');
    btn.innerHTML = '✅ 已复制';
    setTimeout(() => { btn.innerHTML = '📋 复制'; }, 2000);
  });
}

setTheme(getTheme());
const sortDesc = getSortOrder() === 'desc';

loadProjects().then(() => {

});

  if (!document.hidden && !autoRefreshTimer) {
