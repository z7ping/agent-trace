<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Agent Beat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link rel="stylesheet" href="/src/style.css">
  <!-- ═══ 第一层：Logo + 功能Tab + 主题切换 ═══ -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white dark:bg-neutral-900 border-b border-neutral-200 dark:border-neutral-800">
    <div class="max-w-screen-2xl mx-auto px-4 h-12 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-bold text-lg">
        🧠
        <span>Agent Beat</span>
      </a>
      <div class="flex items-center gap-1" id="tabNav">
        <button class="tab-btn active" data-tab="callchain" onclick="switchTab('callchain')">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          调用链
        </button>
        <button class="tab-btn" data-tab="dashboard" onclick="switchTab('dashboard')">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          仪表盘
        </button>
      </div>
      <button id="themeToggle" class="p-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors" title="切换主题">
        <svg class="w-5 h-5 hidden dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="w-5 h-5 block dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <!-- ═══ 第二层：来源 + 项目 + 工具类型 + 状态栏 ═══ -->
  <div class="fixed top-12 left-0 right-0 z-40 bg-white dark:bg-neutral-900 border-b border-neutral-200 dark:border-neutral-800">
    <div class="max-w-screen-2xl mx-auto px-4 py-2 flex items-center gap-3 text-sm flex-wrap">
      <!-- 来源选择 -->
      <div class="flex items-center gap-1 overflow-x-auto" id="toolTabs">
        <button class="tool-tab active" data-tool="all" onclick="selectTool('all')">全部</button>
        <button class="tool-tab" data-tool="claude-code" onclick="selectTool('claude-code')">Claude Code</button>
        <button class="tool-tab" data-tool="hermes" onclick="selectTool('hermes')">Hermes</button>
        <button class="tool-tab" data-tool="codex" onclick="selectTool('codex')">Codex</button>
        <button class="tool-tab" data-tool="opencode" onclick="selectTool('opencode')">OpenCode</button>
        <button class="tool-tab" data-tool="pi" onclick="selectTool('pi')">Pi</button>
        <button class="tool-tab" data-tool="openclaw" onclick="selectTool('openclaw')">OpenClaw</button>
      </div>
      <!-- 项目选择 -->
      <select id="projectSelect" class="bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
        <option value="">全部项目</option>
      </select>
      <div class="w-px h-5 bg-neutral-200 dark:bg-neutral-700"></div>
      <!-- 工具类型筛选 -->
      <div class="flex items-center bg-neutral-100 dark:bg-neutral-800 rounded-lg p-0.5" id="toolFilters">
        <button class="filter-chip-sm active" data-filter="all" onclick="filterTool('all')">全部</button>
        <button class="filter-chip-sm" data-filter="bash" onclick="filterTool('bash')">Bash</button>
        <button class="filter-chip-sm" data-filter="read" onclick="filterTool('read')">Read</button>
        <button class="filter-chip-sm" data-filter="write" onclick="filterTool('write')">Write</button>
        <button class="filter-chip-sm" data-filter="mcp" onclick="filterTool('mcp')">MCP</button>
      </div>
      <!-- 过滤状态摘要 -->
      <span id="filterSummary" class="text-xs text-neutral-400"></span>
      <div class="ml-auto flex items-center gap-4 text-xs text-neutral-500">
        <!-- 状态 -->
        <span id="liveToggle" class="flex items-center gap-1.5 px-2 py-1 rounded-md bg-neutral-100 dark:bg-neutral-800 text-neutral-500 font-medium cursor-pointer hover:bg-neutral-200 dark:hover:bg-neutral-700 transition-colors" onclick="toggleAutoRefresh()" title="点击切换自动刷新">
          <span id="liveDot" class="w-2 h-2 rounded-full bg-neutral-400"></span>
          <span id="liveText">PAUSED</span>
        </span>
        <span class="text-neutral-300 dark:text-neutral-700">·</span>
        <span>Hook</span>
        <span id="hookStatusText">检测中...</span>
        <span class="text-neutral-300 dark:text-neutral-700">·</span>
        <span>错误: <span id="lastErrorCount" class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-bold bg-danger-100 text-danger-700 dark:bg-danger-900/30 dark:text-danger-400">0</span></span>
        <span class="text-neutral-300 dark:text-neutral-700">·</span>
        <span>慢: <span id="slowCount" class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-bold bg-warning-100 text-warning-700 dark:bg-warning-900/30 dark:text-warning-400">0</span></span>
        <!-- 排序 + 展开 -->
        <button id="sortBtn" class="px-2.5 py-1 rounded-md border border-neutral-200 dark:border-neutral-700 hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors">↓ 最新</button>
        <button id="expandAllBtn" class="px-2.5 py-1 rounded-md border border-neutral-200 dark:border-neutral-700 hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors" onclick="toggleAllSessions()">展开全部</button>
      </div>
    </div>
  </div>

  <!-- ═══ 主内容区 ═══ -->
  <main class="pt-[6rem] min-h-screen">

    <!-- ── 调用链 Tab ── -->
    <section id="tab-callchain" class="tab-panel active">
      <!-- 会话列表 -->
      <div class="max-w-screen-2xl mx-auto px-4 py-4">
        <div id="sessionContainer" class="space-y-4"></div>
        <div id="emptyState" class="hidden text-center py-20 text-neutral-400">
          <div class="text-4xl mb-3">📭</div>
          <div class="text-sm">暂无调用记录</div>
          <div class="text-xs mt-1">使用 Claude Code 时会自动捕获</div>
        </div>
      </div>
    </section>

    <!-- ── 仪表盘 Tab ── -->
    <section id="tab-dashboard" class="tab-panel hidden">
      <div class="max-w-screen-2xl mx-auto px-4 py-6">
        <!-- 整体空状态 -->
        <div id="dashboardEmpty" class="hidden">
          <div class="flex flex-col items-center justify-center py-20">
            <div class="text-5xl mb-4">🧠</div>
            <h3 class="text-lg font-semibold text-neutral-700 dark:text-neutral-300 mb-2">暂无监控数据</h3>
            <p class="text-sm text-neutral-500 mb-4">安装 Hook 后，AI 工具的调用记录会自动捕获到这里</p>
            <div class="bg-neutral-100 dark:bg-neutral-800 rounded-lg px-4 py-3 font-mono text-sm text-neutral-700 dark:text-neutral-300 select-all">
              npx agent-beat install
            </div>
          </div>
        </div>
        <!-- 仪表盘内容 -->
        <div id="dashboardContent">
        <!-- 时间范围选择 -->
        <div class="flex items-center gap-3 mb-6">
          <div class="flex items-center bg-neutral-100 dark:bg-neutral-800 rounded-lg p-1">
            <button class="time-btn active" data-range="today" onclick="setTimeRange('today')">今天</button>
            <button class="time-btn" data-range="week" onclick="setTimeRange('week')">本周</button>
            <button class="time-btn" data-range="month" onclick="setTimeRange('month')">本月</button>
            <button class="time-btn" data-range="all" onclick="setTimeRange('all')">全部</button>
          </div>
        </div>

        <!-- 核心指标卡片 -->
        <div class="grid grid-cols-4 gap-4 mb-6">
          <div class="stat-card">
            <div class="flex items-center justify-center w-10 h-10 mx-auto mb-2 rounded-lg bg-primary-50 dark:bg-primary-500/10">
              <svg class="w-5 h-5 text-primary-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <div class="stat-value" id="totalCalls">0</div>
            <div class="stat-label">总调用次数</div>
          </div>
          <div class="stat-card">
            <div class="flex items-center justify-center w-10 h-10 mx-auto mb-2 rounded-lg bg-danger-50 dark:bg-danger-500/10">
              <svg class="w-5 h-5 text-danger-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            </div>
            <div class="stat-value text-danger-500" id="errorRate">0%</div>
            <div class="stat-label">错误率</div>
          </div>
          <div class="stat-card">
            <div class="flex items-center justify-center w-10 h-10 mx-auto mb-2 rounded-lg bg-success-50 dark:bg-success-500/10">
              <svg class="w-5 h-5 text-success-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <div class="stat-value text-success-500" id="activeSessions">0</div>
            <div class="stat-label">活跃会话</div>
          </div>
          <div class="stat-card">
            <div class="flex items-center justify-center w-10 h-10 mx-auto mb-2 rounded-lg bg-info-50 dark:bg-info-500/10">
              <svg class="w-5 h-5 text-info-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
            </div>
            <div class="stat-value text-info-500" id="activeSkills">0</div>
            <div class="stat-label">已用技能</div>
          </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div class="chart-card">
            <h3 class="chart-title">工具使用分布</h3>
            <div class="chart-container">
              <canvas id="toolDistChart"></canvas>
            </div>
          </div>
          <div class="chart-card">
            <h3 class="chart-title">工具调用排行</h3>
            <div class="chart-container">
              <canvas id="toolRankChart"></canvas>
            </div>
          </div>
          <div class="chart-card">
            <h3 class="chart-title">技能调用频率</h3>
            <div class="chart-container">
              <canvas id="skillFreqChart"></canvas>
            </div>
          </div>
        </div>

        <!-- 时间趋势 -->
        <div class="chart-card mb-6">
          <h3 class="chart-title">时间趋势</h3>
          <div class="chart-container-tall">
            <canvas id="trendChart"></canvas>
          </div>
        </div>

        <!-- 会话回顾 + 错误分析 -->
        <div class="grid grid-cols-2 gap-4">
          <div class="list-card">
            <h3 class="chart-title">会话回顾</h3>
            <div id="sessionReview" class="space-y-2"></div>
          </div>
          <div class="list-card">
            <h3 class="chart-title">常见错误 Top 5</h3>
            <div id="errorTop5" class="space-y-2"></div>
          </div>
        </div>
        </div><!-- /dashboardContent -->
      </div>
    </section>
  </main>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
